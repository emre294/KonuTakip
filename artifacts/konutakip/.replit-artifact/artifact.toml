kind = "mobile"
previewPath = "/"
title = "KonuTakip"
version = "1.0.0"
id = "artifacts/konutakip"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23167

[services.development]
run = "pnpm --filter @workspace/konutakip run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/konutakip", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/konutakip", "run", "serve" ]

[services.env]
PORT = "23167"
BASE_PATH = "/"
